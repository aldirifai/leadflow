services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leadflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadflow}
      POSTGRES_DB: ${POSTGRES_DB:-leadflow_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-leadflow}:${POSTGRES_PASSWORD:-leadflow}@postgres:5432/${POSTGRES_DB:-leadflow_db}
      API_KEY: ${API_KEY:-dev-key-change-me}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-haiku}
      DAILY_INGEST_LIMIT: ${DAILY_INGEST_LIMIT:-200}
      COOLDOWN_DAYS: ${COOLDOWN_DAYS:-30}
      CORS_ORIGINS: http://localhost:3000
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001/api
      NEXT_PUBLIC_API_KEY: ${API_KEY:-dev-key-change-me}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  postgres-data-dev:
