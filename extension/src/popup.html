<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Leadflow</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 16px;
      margin: 0;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0f0; }
    }
    h1 { font-size: 15px; margin: 0 0 4px; }
    p.muted { color: #666; font-size: 11px; margin: 0 0 12px; }
    label { display: block; font-size: 11px; font-weight: 500; margin-bottom: 4px; color: #666; }
    input {
      width: 100%; padding: 6px 8px; font-size: 12px;
      border: 1px solid #ccc; border-radius: 4px; background: transparent;
      color: inherit; box-sizing: border-box; margin-bottom: 8px;
    }
    button {
      width: 100%; padding: 8px;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 4px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; margin-bottom: 6px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.outline { background: transparent; color: inherit; border: 1px solid #ccc; }
    .status {
      padding: 8px; border-radius: 4px; margin-top: 8px;
      font-size: 11px; line-height: 1.4;
    }
    .ok { background: #d1fae5; color: #065f46; }
    .err { background: #fee; color: #c00; }
    .info { background: #f0f0f0; color: #333; }
    .stats { font-size: 11px; color: #666; margin-top: 8px; }
    hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
    @media (prefers-color-scheme: dark) {
      input, button.outline { border-color: #444; }
      .info { background: #2a2a2a; color: #ccc; }
      hr { border-color: #333; }
    }
  </style>
</head>
<body>
  <h1>Leadflow Capture</h1>
  <p class="muted">Capture listings dari Google Maps yang sedang kamu lihat.</p>

  <div id="setup-section">
    <label>API URL</label>
    <input id="apiUrl" type="text" placeholder="https://leadflow.aldirifai.com/api" />
    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="dari .env backend" />
    <button id="saveConfig">Save settings</button>
    <hr />
  </div>

  <button id="captureBtn">Capture visible listings</button>
  <button id="capturePageBtn" class="outline">Capture current page detail</button>

  <div id="status"></div>
  <div id="stats" class="stats"></div>

  <script src="popup.js"></script>
</body>
</html>
